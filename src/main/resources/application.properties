spring.application.name=inventory-system

# --- Database Connection ---
# These variables must be set in your Render Dashboard (Environment Tab)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Settings ---
# Explicitly setting the dialect prevents the "DialectResolutionInfo" error
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# --- Hikari Connection Pool (Stability) ---
# Helps maintain a healthy connection to the remote database
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# --- Render Port Binding ---
# Render looks for port 8080 by default for Web Services
server.port=8080
