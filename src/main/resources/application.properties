spring.application.name=inventory-system

# Database Connection (Placeholder for Deployment)
# These ${VARIABLES} will be filled automatically by the Hosting Service
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# This allows the app to switch between MySQL (local) and PostgreSQL (cloud) automatically
spring.jpa.open-in-view=false