<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Airtel | Inventory Management</title>
    <style>
        :root { --airtel: #E40000; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
        .nav { background: var(--airtel); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav strong { font-size: 1.2rem; letter-spacing: 1px; }
        .container { padding: 30px 5%; flex: 1; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        h2 { color: var(--airtel); border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-top: 0; font-size: 1.3rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input, select { padding: 12px; width: 100%; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { background: var(--airtel); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s; width: 100%; display: inline-block; text-align: center; }
        .btn:hover { background: #b30000; }
        .btn-secondary { background: #333; }
        .btn-assign { padding: 5px 10px; font-size: 11px; width: auto; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 12px; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #e8f5e9; color: #2e7d32; }
        .footer { background: #1a1a1a; color: #888; text-align: center; padding: 25px; margin-top: auto; border-top: 4px solid var(--airtel); }
    </style>
</head>
<body>
    <div class="nav">
        <strong>AIRTEL INVENTORY</strong>
        <a th:href="@{/logout}" style="color:white; text-decoration:none; border: 1px solid white; padding: 5px 15px; border-radius: 5px;">Sign Out</a>
    </div>

    <div class="container">
        
        <div class="card" th:if="${assetToUpdate != null}" style="border: 2px solid var(--airtel);">
            <h2>Update Asset Details</h2>
            <form th:action="@{/admin/assets/update}" th:object="${assetToUpdate}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="grid" style="margin-bottom:0;">
                    <div>
                        <label>Category</label>
                        <select th:field="*{category}">
                            <option value="PHONE">Phone</option>
                            <option value="TABLET">Tablet</option>
                            <option value="COMPUTER">Computer</option>
                            <option value="NETWORK_DEVICE">Network Device</option>
                        </select>
                    </div>
                    <div>
                        <label>Asset Name</label>
                        <input type="text" th:field="*{name}" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-secondary">Confirm Update</button>
                <a th:href="@{/dashboard}" style="display:block; text-align:center; margin-top:10px; color:#666; font-size:14px;">Cancel Edit</a>
            </form>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Register New Asset</h2>
                <form th:action="@{/admin/assets/save}" th:object="${newAsset}" method="post">
                    <label>Category</label>
                    <select th:field="*{category}" required>
                        <option value="PHONE">Phone</option>
                        <option value="TABLET">Tablet</option>
                        <option value="COMPUTER">Computer</option>
                        <option value="NETWORK_DEVICE">Network Device</option>
                    </select>
                    <input type="text" th:field="*{name}" placeholder="Asset Name" required>
                    <input type="text" th:field="*{serialNumber}" placeholder="Serial Number" required>
                    <input type="text" th:field="*{brand}" placeholder="Brand">
                    <button type="submit" class="btn">Add to Inventory</button>
                </form>
            </div>

            <div class="card">
                <h2>Register Staff Member</h2>
                <form th:action="@{/admin/users/save}" th:object="${newUser}" method="post">
                    <input type="text" th:field="*{name}" placeholder="Full Name" required>
                    <input type="text" th:field="*{username}" placeholder="Staff ID (e.g. 24RP...)" required>
                    <input type="email" th:field="*{email}" placeholder="Email Address">
                    <button type="submit" class="btn btn-secondary">Register Staff</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h2>Inventory & Assignments</h2>
            <table>
                <thead>
                    <tr>
                        <th>Category</th><th>Name</th><th>S/N</th><th>Status</th><th>Assign To</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${assets}">
                        <td th:text="${a.category}"></td>
                        <td th:text="${a.name}"></td>
                        <td th:text="${a.serialNumber}"></td>
                        <td><span class="status-tag" th:text="${a.status}"></span></td>
                        <td>
                            <form th:action="@{/admin/assets/assign}" method="post" style="display:flex; gap:5px;">
                                <input type="hidden" name="assetId" th:value="${a.id}">
                                <select name="userId" style="margin:0; width: 120px; padding: 5px; font-size:12px;">
                                    <option value="">Select Staff</option>
                                    <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name}"></option>
                                </select>
                                <button type="submit" class="btn btn-assign">Assign</button>
                            </form>
                            <small th:if="${a.assignedUser != null}" th:text="'Held by: ' + ${a.assignedUser.name}"></small>
                        </td>
                        <td>
                            <a th:href="@{'/admin/assets/edit/' + ${a.id}}" style="color:blue; margin-right:10px;">Edit</a>
                            <a th:href="@{'/admin/assets/delete/' + ${a.id}}" onclick="return confirm('Delete?')" style="color:var(--airtel);">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        <strong style="color:white;">airtel</strong><br>
        &copy; 2026 Airtel IT Solutions | Managed by niroBwimba
    </div>
</body>
</html>
