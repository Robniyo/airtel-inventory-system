<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Airtel | Inventory Management</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .nav { background: #E40000; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn { padding: 8px 15px; border-radius: 4px; text-decoration: none; color: white; cursor: pointer; border: none; }
        .btn-add { background: #E40000; }
        .btn-del { background: #333; }
    </style>
</head>
<body>
    <div class="nav">
        <span>Airtel Inventory System (Admin)</span>
        <a th:href="@{/logout}" style="color:white;">Logout</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>Add New Asset</h2>
            <form th:action="@{/admin/assets/save}" method="post">
                <input type="text" name="name" placeholder="Asset Name" required>
                <input type="text" name="serialNumber" placeholder="Serial Number" required>
                <button type="submit" class="btn btn-add">Save Asset</button>
            </form>
        </div>
        <div class="card">
            <h2>Current Inventory</h2>
            <table>
                <thead>
                    <tr><th>Name</th><th>S/N</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${assets}">
                        <td th:text="${a.name}"></td>
                        <td th:text="${a.serialNumber}"></td>
                        <td th:text="${a.status}"></td>
                        <td>
                            <a th:href="@{'/admin/assets/delete/' + ${a.id}}" class="btn btn-del">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
