<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Airtel | Join the Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --airtel-red: #E40000; --dark: #1A1A1B; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 350px; }
        .brand { color: var(--airtel-red); font-weight: 800; font-size: 32px; text-align: center; margin-bottom: 10px; }
        h2 { text-align: center; margin-bottom: 25px; font-size: 18px; color: #65676B; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--airtel-red); }
        .btn { background: var(--airtel-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #65676B; }
        .footer-link a { color: var(--airtel-red); text-decoration: none; font-weight: 600; }
        .error { color: var(--airtel-red); font-size: 12px; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">airtel</div>
        <h2>Create Staff Account</h2>
        
        <div th:if="${param.error}" class="error">Email already registered in the system.</div>

        <form th:action="@{/signup}" th:object="${user}" method="post">
            <input type="text" th:field="*{name}" placeholder="Full Name" required>
            <input type="email" th:field="*{email}" placeholder="Staff Email (@airtel.com)" required>
            <input type="password" th:field="*{password}" placeholder="Create Password" required>
            <button type="submit" class="btn">Register Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a th:href="@{/login}">Sign In</a>
        </div>
    </div>
</body>
</html>
