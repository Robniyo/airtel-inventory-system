<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <h2>Inventory System</h2>
    <a href="/">Dashboard</a>
    <a href="/assets">Assets</a>
    <a href="/users">Users</a>
</div>

<div class="container">

    <h2>User Management</h2>

    <!-- FORM -->
    <div class="form-box">

        <form action="/users/save" method="post" th:object="${user}">

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Department</label>
            <input type="text" name="department" required>

            <button type="submit" class="btn save">Save User</button>

        </form>

    </div>

    <!-- TABLE -->
    <table class="table">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>

        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.name}"></td>
            <td th:text="${u.department}"></td>

            <td>
                <a th:href="@{/users/edit/{id}(id=${u.id})}" class="btn edit">Edit</a>
                <a th:href="@{/users/delete/{id}(id=${u.id})}" class="btn delete">Delete</a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
