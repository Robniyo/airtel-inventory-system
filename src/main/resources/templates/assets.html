<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Airtel Asset Registry</title>
    <style>
        :root { --red: #E40000; --dark: #222; }
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .form-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-save { background: var(--red); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; grid-column: span 3; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f4f4f4; color: #666; font-size: 13px; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .AVAILABLE { background: #d4edda; color: #155724; }
        .ASSIGNED { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="color: var(--red);">Register & Assign Asset</h2>

    <div class="form-card">
        <form th:action="@{/assets/save}" th:object="${asset}" method="post" class="grid">
            <input type="hidden" th:field="*{id}">
            
            <input type="text" th:field="*{name}" placeholder="Asset Name" required>
            <input type="text" th:field="*{serialNumber}" placeholder="Serial Number (Unique)" required>
            <input type="text" th:field="*{brand}" placeholder="Brand (e.g. Dell)">
            
            <select th:field="*{category}">
                <option value="Laptop">Laptop</option>
                <option value="Phone">Smartphone</option>
                <option value="Monitor">Monitor</option>
                <option value="Network">Networking Gear</option>
            </select>

            <input type="date" th:field="*{purchaseDate}">
            
            <input type="number" step="0.01" th:field="*{price}" placeholder="Price (USD)">

            <select th:field="*{assignedUser}">
                <option th:value="${null}">-- Assign to Employee --</option>
                <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name + ' (' + u.email + ')'}"></option>
            </select>

            <button type="submit" class="btn-save">Save & Update Inventory</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>Asset Name</th>
                <th>Serial No</th>
                <th>Category</th>
                <th>Price</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${assets}">
                <td th:text="${a.name}" style="font-weight: bold;"></td>
                <td th:text="${a.serialNumber}"></td>
                <td th:text="${a.category}"></td>
                <td th:text="${'$' + a.price}"></td>
                <td th:text="${a.assignedUser != null ? a.assignedUser.name : 'Unassigned'}"></td>
                <td><span th:text="${a.status}" th:class="'status ' + ${a.status}"></span></td>
                <td>
                    <a th:href="@{/assets/edit/{id}(id=${a.id})}" style="color: blue;">Edit</a> |
                    <a th:href="@{/assets/delete/{id}(id=${a.id})}" style="color: red;" onclick="return confirm('Delete?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
