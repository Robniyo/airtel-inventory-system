<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtel | Inventory Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --airtel-red: #E40000; --bg: #F8F9FA; --white: #FFFFFF; --dark: #1A1A1B; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background: var(--white); padding: 0 8%; display: flex; align-items: center; height: 80px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .brand { color: var(--airtel-red); font-weight: 800; font-size: 28px; text-decoration: none; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--white); width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); border-top: 6px solid var(--airtel-red); }
        .card-header { text-align: center; margin-bottom: 30px; }
        .card-header h2 { margin: 0; font-weight: 800; font-size: 24px; color: var(--dark); }
        .error-msg { color: var(--airtel-red); background: #FFF0F0; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; border: 1px solid #FFDCDC; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #65676B; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #F1F1F1; border-radius: 12px; font-size: 14px; box-sizing: border-box; background: #FAFAFA; }
        input:focus { border-color: var(--airtel-red); outline: none; background: white; }
        .btn-submit { width: 100%; background: var(--airtel-red); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(228, 0, 0, 0.3); }
        .guide-box { background: #F8F9FA; border: 1px dashed #DDD; padding: 15px; border-radius: 12px; margin-top: 25px; font-size: 13px; text-align: center; }
        .footer { text-align: center; padding: 30px; background: var(--dark); color: #888; font-size: 12px; }
    </style>
</head>
<body>
<nav class="navbar"><a href="/" class="brand">airtel</a></nav>
<div class="login-wrapper">
    <div class="login-card">
        <div class="card-header">
            <h2>Inventory System</h2>
            <p style="color:#65676B; font-size:14px;">Sign in to manage assets</p>
        </div>

        <div th:if="${param.error}" class="error-msg">
            Invalid credentials. Please try again.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username / Reg No</label>
                <input type="text" name="username" placeholder="24RP05300" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Verify & Continue</button>
        </form>

        <div class="guide-box">
            <span style="color:#666">Lecturer Access:</span><br>
            <strong>User: 24RP05300 | Pass: 24RP12881</strong>
        </div>
    </div>
</div>
<footer class="footer">
    &copy; 2026 Airtel IT Solutions | niroBwimba
</footer>
</body>
</html>
