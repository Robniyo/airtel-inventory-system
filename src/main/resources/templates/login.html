<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtel | Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --airtel-red: #E40000; --bg: #F8F9FA; --white: #FFFFFF;
            --dark: #1A1A1B; --grey: #65676B; --shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh; color: var(--dark);
        }

        .navbar { 
            background: var(--white); padding: 0 8%; display: flex; 
            justify-content: space-between; align-items: center; height: 80px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .brand { color: var(--airtel-red); font-weight: 800; font-size: 28px; text-decoration: none; letter-spacing: -1.5px; }

        .login-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
        }

        .login-card {
            background: var(--white); width: 100%; max-width: 400px; 
            padding: 40px; border-radius: 24px; box-shadow: var(--shadow);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .role-switch {
            display: flex; background: #EEE; padding: 5px; border-radius: 14px; margin-bottom: 30px;
        }
        .role-btn {
            flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer;
            font-weight: 700; font-size: 13px; transition: var(--transition); background: transparent; color: var(--grey);
        }
        .role-btn.active { background: var(--airtel-red); color: white; }

        .card-header { text-align: center; margin-bottom: 25px; }
        .card-header h2 { margin: 0; font-weight: 800; font-size: 24px; letter-spacing: -1px; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--grey); margin-bottom: 8px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 14px; border: 2px solid #F1F1F1; border-radius: 12px; 
            font-size: 14px; transition: var(--transition); background: #FAFAFA; box-sizing: border-box;
        }
        input:focus { border-color: var(--airtel-red); background: white; outline: none; }

        .btn-submit { 
            width: 100%; background: var(--airtel-red); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; 
            transition: var(--transition); font-size: 16px; margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(228, 0, 0, 0.3); }

        /* UNIFIED LOGO/CREDENTIALS BOX */
        .guide-box {
            background: #FFF5F5; border: 1px solid #FFDCDC; padding: 15px;
            border-radius: 12px; margin-top: 25px; font-size: 13px; text-align: center;
        }
        .guide-box strong { color: var(--airtel-red); display: block; margin-bottom: 8px; font-size: 14px; }
        .guide-box div { color: #b30000; font-weight: 800; font-family: monospace; font-size: 15px; }

        .footer {
            text-align: center; padding: 40px; background: var(--dark); color: #888; font-size: 13px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="brand">airtel</a>
</nav>

<div class="login-wrapper">
    <div class="login-card">
        
        <div class="role-switch">
            <button type="button" class="role-btn active" id="userBtn" onclick="setRole('user')">Staff Login</button>
            <button type="button" class="role-btn" id="adminBtn" onclick="setRole('admin')">Admin Login</button>
        </div>

        <div class="card-header">
            <h2 id="loginTitle">Staff Portal</h2>
            <p id="loginDesc" style="font-size:13px; color:var(--grey); margin-top:5px;">Airtel Resource Intelligence</p>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" name="role" id="roleInput" value="user">
            
            <div class="form-group">
                <label>Username / ID No</label>
                <input type="text" name="username" placeholder="Enter Registration Number" required>
            </div>
            
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Verify & Login</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <span style="font-size: 13px; color: var(--grey);">New staff? </span>
            <a th:href="@{/signup}" style="color: var(--airtel-red); font-weight: 700; text-decoration: none; font-size: 13px;">Create Account</a>
        </div>

        <div class="guide-box">
            <strong>👨‍🏫 Login Credentials:</strong>
            <div>Username: 24RP05300</div>
            <div>Password: 24RP12881</div>
        </div>
    </div>
</div>

<footer class="footer">
    <div style="margin-bottom: 10px;">
        <strong style="color:white; font-size: 18px; letter-spacing: -1px;">airtel</strong>
    </div>
    &copy; 2026 Airtel IT Solutions. All rights reserved. <br>
    <span style="opacity: 0.5;">Assignment by niroBwimba</span>
</footer>

<script>
    function setRole(role) {
        const userBtn = document.getElementById('userBtn');
        const adminBtn = document.getElementById('adminBtn');
        const roleInput = document.getElementById('roleInput');
        const title = document.getElementById('loginTitle');

        roleInput.value = role;

        if (role === 'admin') {
            adminBtn.classList.add('active');
            userBtn.classList.remove('active');
            title.innerText = 'Admin Console';
        } else {
            userBtn.classList.add('active');
            adminBtn.classList.remove('active');
            title.innerText = 'Staff Portal';
        }
    }
</script>

</body>
</html>
